<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictater Teacher Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700;800&family=Source+Sans+3:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <header class="teacher-header">
    <div class="teacher-header__brand">
      <a href="/" class="teacher-back-link">← Student app</a>
      <h1 class="section-title section-title--plain">Teacher Portal</h1>
      <p class="settings-note">Create classes, enroll students, assign lessons, and export progress.</p>
    </div>
    <p id="teacher-status" class="settings-note teacher-status">Not signed in</p>
    <div id="teacher-signed-in" class="hidden">
      <span class="exercise-badge badge-diff-beginner">Teacher</span>
    </div>
  </header>

  <main class="teacher-main">
    <section id="teacher-signin-section" class="glass-card teacher-card">
      <h2 class="input-label">Teacher sign-in</h2>
      <div class="auth-row">
        <input type="email" id="teacher-email" class="settings-select" placeholder="teacher@school.edu">
        <button type="button" id="teacher-login" class="btn-primary btn-compact">Sign In</button>
      </div>
    </section>

    <section class="glass-card teacher-card">
      <h2 class="input-label">Create class</h2>
      <div class="auth-row">
        <input type="text" id="class-name" class="settings-select" placeholder="Class name (e.g. Grade 3A)">
        <button type="button" id="create-class" class="btn-primary btn-compact">Create</button>
      </div>
      <div id="class-result" class="result-card feedback hidden"></div>
    </section>

    <section class="glass-card teacher-card">
      <h2 class="input-label">Enroll student</h2>
      <div class="auth-row">
        <input type="text" id="class-id" class="settings-select" placeholder="Class ID">
        <input type="email" id="student-email" class="settings-select" placeholder="student@school.edu">
        <button type="button" id="enroll-student" class="btn-secondary btn-compact">Enroll</button>
      </div>
    </section>

    <section class="glass-card teacher-card">
      <h2 class="input-label">Assign lesson</h2>
      <div class="stack-sm">
        <div class="auth-row">
          <input type="text" id="assign-class-id" class="settings-select" placeholder="Class ID">
          <input type="date" id="assign-due" class="settings-select">
        </div>
        <div class="auth-row">
          <select id="assign-lesson-select" class="settings-select">
            <option value="">Choose a lesson…</option>
          </select>
        </div>
        <div class="auth-row">
          <input type="text" id="assign-lesson-id" class="settings-select" placeholder="Or enter lesson ID" list="lesson-id-list">
          <datalist id="lesson-id-list"></datalist>
        </div>
        <div class="auth-row">
          <input type="text" id="assign-title" class="settings-select" placeholder="Assignment title">
          <button type="button" id="create-assignment" class="btn-primary btn-compact">Assign</button>
        </div>
      </div>
      <div id="assign-result" class="settings-note"></div>
    </section>

    <section class="glass-card teacher-card">
      <h2 class="input-label">Class report</h2>
      <div class="auth-row">
        <input type="text" id="report-class-id" class="settings-select" placeholder="Class ID">
        <button type="button" id="view-report" class="btn-secondary btn-compact">View JSON</button>
        <a id="csv-link" class="btn-secondary btn-compact" href="#" download>Export CSV</a>
      </div>
      <pre id="report-output" class="original-peek activity-log-scroll teacher-report"></pre>
    </section>
  </main>

  <div id="teacher-toast-container" class="toast-container" aria-live="polite"></div>
  <script type="module" src="/src/teacher.js"></script>
</body>
</html>
