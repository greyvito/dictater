name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run validate:content
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    env:
      CI: true
      E2E_PORT: 5199
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run test:e2e:install
      - run: npm run test:e2e
